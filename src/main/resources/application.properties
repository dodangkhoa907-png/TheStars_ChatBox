# ============================================================
# ChatBox_TheStars — Application Configuration
# All secrets/environment-specific values come from environment
# variables — see .env.example for the full list. Nothing sensitive
# is hardcoded here, so this file is safe to commit.
# ============================================================

# Server
server.port=${PORT:8080}

# ============================================================
# SQL Server Database
# ============================================================
spring.datasource.url=${DB_URL:jdbc:sqlserver://14.225.217.109;databaseName=ChatBox_TheStars;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# Google OAuth 2.0
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ============================================================
# Logging
# ============================================================
logging.level.com.thestars.chatbox=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.web.socket=${LOG_LEVEL:DEBUG}
# Temporary — pinpointing an unexplained 403 on permitAll paths in production.
# Remove once resolved; this is noisy for normal operation.
logging.level.org.springframework.security=DEBUG

# ============================================================
# JSP View Resolver
# ============================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
