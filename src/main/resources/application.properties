# ============================================================
# ChatBox_TheStars — Application Configuration
# All secrets/environment-specific values come from environment
# variables — see .env.example for the full list. Nothing sensitive
# is hardcoded here, so this file is safe to commit.
# ============================================================

# Server
server.port=${PORT:8080}

# ============================================================
# SQL Server Database
# ============================================================
spring.datasource.url=${DB_URL:jdbc:sqlserver://14.225.217.109;databaseName=ChatBox_TheStars;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:TOP1@iyounguru!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver



# Connection Pool (HikariCP)
# 10 connections is only enough for local single-user testing — under real
# concurrent load every message send, page load, and API call competes for the
# same tiny pool, so requests queue for a free connection. That queueing is
# almost certainly what "lag, message stuck sending" looks like in production.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:30}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
# Fail fast instead of hanging: if the pool really is exhausted, a request
# should error out in a few seconds (so the UI can show "failed, retry") rather
# than leave a message spinning for up to 30s before finally failing anyway.
spring.datasource.hikari.connection-timeout=8000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# Google OAuth 2.0
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ============================================================
# Logging
# ============================================================
# DEBUG is fine for local dev but expensive under real concurrent traffic —
# especially Security DEBUG, which logs every filter-chain step for every
# single request. Default to INFO; override LOG_LEVEL/SECURITY_LOG_LEVEL to
# turn DEBUG back on temporarily when actually chasing a specific bug.
logging.level.com.thestars.chatbox=${LOG_LEVEL:INFO}
logging.level.org.springframework.web.socket=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}

# ============================================================
# JSP View Resolver
# ============================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
